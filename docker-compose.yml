services:
    nginx:
        container_name: "nginx"
        network_mode: "host"
        volumes:
            - './nginx.conf:/etc/nginx/nginx.conf'	# 配置文件映射
            - './conf.d:/etc/nginx/conf.d'	# 配置文件映射
            - './ssl:/etc/nginx/ssl'			# 证书目录映射
            - './html:/usr/share/nginx/html'		# 页面目录映射（可选）
        restart: always
        image: 'nginx:stable-alpine-slim'